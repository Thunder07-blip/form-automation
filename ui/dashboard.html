<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FormAI - Dashboard</title>
  <link href="../src/output.css" rel="stylesheet">
  <link href="../src/input.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    body { width: 420px; height: 600px; }
  </style>
</head>
<body class="bau-texture font-sans text-primary">
  <div class="h-full flex flex-col p-4 overflow-y-auto" id="dashboard-content">
    
    <!-- Header -->
    <div class="flex items-center justify-between border-b-4 border-primary pb-3 mb-4">
      <div>
        <h1 class="text-2xl font-black uppercase tracking-tighter" id="welcome-text">Dashboard</h1>
        <p class="text-xs font-bold opacity-80 uppercase" id="user-college">Loading...</p>
      </div>
      <button id="close-btn" class="bg-background border-2 border-primary hover:bg-secondary transition-colors p-1 flex items-center justify-center neo-shadow">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <p class="text-[10px] font-black uppercase opacity-70">Forms Processed</p>
        <p class="text-2xl font-black" id="stat-forms">-</p>
      </div>
      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <p class="text-[10px] font-black uppercase opacity-70">Questions Solved</p>
        <p class="text-2xl font-black" id="stat-questions">-</p>
      </div>
      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <p class="text-[10px] font-black uppercase opacity-70">Avg Qs / Form</p>
        <p class="text-xl font-black mt-1" id="stat-avg-qs">-</p>
      </div>
      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <p class="text-[10px] font-black uppercase opacity-70">Avg Time</p>
        <p class="text-xl font-black mt-1" id="stat-avg-time">- s</p>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="flex-1">
      <h2 class="text-sm font-black uppercase mb-2">Recent Activity</h2>
      <div id="activity-list" class="space-y-2">
        <!-- Dynamically filled -->
        <p class="text-xs font-bold text-center opacity-50 my-4">Loading activity...</p>
      </div>
    </div>

    <button id="logout-btn" class="mt-4 w-full bg-background text-primary font-black uppercase p-2 border-4 border-primary neo-shadow hover:bg-[#ff3333] hover:text-white transition-colors">
      Sign Out
    </button>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>

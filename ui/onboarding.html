<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FormAI - Onboarding</title>
  <link href="../src/output.css" rel="stylesheet">
  <link href="../src/input.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    body { width: 420px; height: 600px; }
  </style>
</head>
<body class="bau-texture font-sans text-primary">
  <div class="h-full flex flex-col p-4 overflow-y-auto">
    <!-- Header -->
    <div class="mb-6 border-b-4 border-primary pb-4">
      <h1 class="text-2xl font-black uppercase tracking-tighter">Welcome to FormAI</h1>
      <p class="text-xs font-bold opacity-80 uppercase">Let's set up your profile.</p>
    </div>

    <!-- Error Box -->
    <div id="error-box" class="hidden bg-[#ff3333] border-4 border-primary p-2 mb-4 neo-shadow text-white font-bold text-xs">
      Please fill in all required fields.
    </div>

    <!-- Onboarding Form -->
    <form id="onboarding-form" class="space-y-4 flex-1">
      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <label class="block font-black uppercase text-xs mb-1">Full Name</label>
        <input type="text" id="name" class="w-full border-2 border-primary bg-background p-2 text-sm font-bold focus:outline-none focus:ring-2 ring-secondary" required placeholder="John Doe">
      </div>

      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <label class="block font-black uppercase text-xs mb-1">Gender</label>
        <select id="gender" class="w-full border-2 border-primary bg-background p-2 text-sm font-bold focus:outline-none" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
      </div>

      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <label class="block font-black uppercase text-xs mb-1">College</label>
        <input type="text" id="college" class="w-full border-2 border-primary bg-background p-2 text-sm font-bold focus:outline-none" required placeholder="e.g. Stanford University">
      </div>

      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <label class="block font-black uppercase text-xs mb-1">Branch / Department</label>
        <input type="text" id="branch" class="w-full border-2 border-primary bg-background p-2 text-sm font-bold focus:outline-none" required placeholder="e.g. Computer Science">
      </div>

      <div class="bg-primary-container border-4 border-primary p-3 neo-shadow">
        <label class="block font-black uppercase text-xs mb-1">Academic Year</label>
        <select id="year" class="w-full border-2 border-primary bg-background p-2 text-sm font-bold focus:outline-none" required>
          <option value="">Select Year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
          <option value="5">5th Year+</option>
        </select>
      </div>

      <button type="submit" id="submit-btn" class="w-full bg-secondary text-primary font-black uppercase p-3 border-4 border-primary neo-shadow hover:translate-y-0.5 hover:translate-x-0.5 hover:shadow-[2px_2px_0px_0px_#1a1a1a] transition-all">
        Save & Continue
      </button>
    </form>
  </div>
  <script src="onboarding.js"></script>
</body>
</html>
